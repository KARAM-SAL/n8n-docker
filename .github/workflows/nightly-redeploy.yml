name: Nightly Redeploy

on:
  schedule:
    # Run at 3am UTC daily
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update timestamp to trigger redeploy
        run: echo "Last redeploy: $(date -u)" > .redeploy-timestamp
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .redeploy-timestamp
          git commit -m "chore: trigger nightly redeploy to pull latest n8n image"
          git push

